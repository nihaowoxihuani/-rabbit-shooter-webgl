<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>%UNITY_WEB_NAME%</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #unity-loading-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      font-family: sans-serif;
    }
    #unity-progress-bar-empty {
      width: 200px;
      height: 10px;
      background: #333;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
    }
    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #4ecca3;
      border-radius: 5px;
      transition: width 0.1s;
    }
    #unity-warning {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff4444;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 14px;
      display: none;
      z-index: 100;
    }
    @media (orientation: landscape) {
      #unity-canvas {
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg);
      }
    }
  </style>
</head>
<body>
  <div id="unity-warning"></div>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
      <div>加载中...</div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      warningBanner.style.display = "block";
      warningBanner.innerText = msg;
      if (type === "error") warningBanner.style.background = "#ff4444";
      else if (type === "warning") warningBanner.style.background = "#ffaa00";
    }

    function resizeCanvas() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/%UNITY_WEBGL_LOADER_URL%";
    var config = {
      dataUrl: buildUrl + "/%UNITY_WEBGL_DATA_URL%",
      frameworkUrl: buildUrl + "/%UNITY_WEBGL_FRAMEWORK_URL%",
      codeUrl: buildUrl + "/%UNITY_WEBGL_CODE_URL%",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "%UNITY_WEBGL_COMPANY_NAME%",
      productName: "%UNITY_WEBGL_PRODUCT_NAME%",
      productVersion: "%UNITY_WEBGL_PRODUCT_VERSION%",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    }

    %UNITY_WEBGL_GLFW_ENTER_KEY_FIX%

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
